<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotografia — Doisneau Bologna</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .photo-detail-layout {
      display: grid; grid-template-columns: 1.1fr 1fr; gap: 4rem;
      padding: 3rem 2.5rem 5rem;
    }
    .photo-frame {
      position: relative; background: #0d0d0d;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; box-shadow: inset 0 0 0 0.5px rgba(200,180,130,0.15);
    }
    .photo-frame img {
      width: 100%; max-height: 520px; object-fit: contain;
      filter: grayscale(30%) contrast(1.05);
    }
    .photo-frame-caption {
      position: absolute; bottom: 0.6rem; right: 0.8rem;
      font-size: 10px; letter-spacing: 0.15em; color: rgba(240,236,228,0.25);
    }
    .photo-info { display: flex; flex-direction: column; gap: 0; }
    .info-row {
      display: flex; flex-direction: column; gap: 0.25rem;
      padding: 1rem 0; border-bottom: 0.5px solid rgba(200,180,130,0.1);
    }
    .info-row:first-child { padding-top: 0; }
    .info-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: #c8b482; }
    .info-value { font-size: 16px; color: rgba(240,236,228,0.82); line-height: 1.5; }
    .info-value.large { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; line-height: 1.15; }
    .info-value.italic { font-style: italic; color: rgba(240,236,228,0.55); }
    .info-value.price { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: #c8b482; }
    .info-desc { font-size: 15px; line-height: 1.8; color: rgba(240,236,228,0.68); padding: 1.2rem 0; border-bottom: 0.5px solid rgba(200,180,130,0.1); }
    .action-area { padding-top: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .action-note { font-size: 13px; color: rgba(240,236,228,0.4); font-style: italic; }
    .admin-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: rgba(240,236,228,0.4); font-size: 13px; letter-spacing: 0.08em; text-decoration: none; margin: 1.5rem 2.5rem 0; transition: color 0.2s; }
    .back-link:hover { color: #c8b482; }

    body.light-mode .photo-frame { background: #f0ebe0; box-shadow: inset 0 0 0 0.5px rgba(133,121,111,0.2); }
    body.light-mode .photo-frame-caption { color: rgba(31,31,31,0.25); }
    body.light-mode .info-row { border-bottom-color: rgba(133,121,111,0.1); }
    body.light-mode .info-label { color: #9a3636; }
    body.light-mode .info-value { color: rgba(31,31,31,0.82); }
    body.light-mode .info-value.italic { color: rgba(31,31,31,0.5); }
    body.light-mode .info-value.price { color: #9a3636; }
    body.light-mode .info-desc { color: rgba(31,31,31,0.68); border-bottom-color: rgba(133,121,111,0.1); }
    body.light-mode .action-note { color: rgba(31,31,31,0.4); }
    body.light-mode .back-link { color: rgba(31,31,31,0.4); }
    body.light-mode .back-link:hover { color: #9a3636; }

    @media (max-width: 768px) { .photo-detail-layout { grid-template-columns: 1fr; gap: 2rem; padding: 2rem 1rem 4rem; } }
  </style>
</head>
<body>
<div class="site">

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>renderNavbar("mostra");</script>

  <a href="mostra-index.html" class="back-link">← Torna alla galleria</a>

  <div id="page-content"></div>

  <footer class="footer">
    <span>© 2026 Mostra Doisneau — Bologna</span>
    <span>Privacy · Accessibilità</span>
  </footer>

</div>
<script>
const params = new URLSearchParams(location.search);
const photoId = parseInt(params.get("id"));
let photo = null;

function buildActions(p) {
  const role = getRole();
  const isMyBooking = p.bookedBy === "user" && role === "user";

  // Guest
  if (role === "guest") {
    if (p.state === "disponibile") return `<p class="action-note">Accedi come utente per prenotare.</p>`;
    return "";
  }

  // Admin
  if (role === "admin") {
    let btns = `<div class="admin-actions">`;
    if (p.state === "prenotata") {
      btns += `<button class="btn btn-solid btn-sm" onclick="handleConfirmSale()">✓ Conferma vendita</button>`;
      btns += `<button class="btn btn-danger btn-sm" onclick="handleCancelBooking()">✕ Annulla prenotazione</button>`;
    }
    if (p.state === "disponibile") {
      btns += `<span class="action-note">Nessuna prenotazione attiva.</span>`;
    }
    if (p.state === "venduta") {
      btns += `<span class="action-note">Fotografia venduta.</span>`;
    }
    btns += `</div>`;
    return btns;
  }

  // User
  if (p.state === "disponibile") {
    return `<button class="btn btn-gold" onclick="handleBook()">Prenota questa fotografia</button>`;
  }
  if (p.state === "prenotata" && isMyBooking) {
    return `
      <p class="action-note">Hai prenotato questa fotografia.</p>
      <button class="btn btn-danger btn-sm" onclick="handleCancelBooking()">Elimina prenotazione</button>`;
  }
  if (p.state === "prenotata" && !isMyBooking) {
    return `<p class="action-note">Fotografia già prenotata.</p>`;
  }
  if (p.state === "venduta") {
    return `<p class="action-note">Fotografia venduta.</p>`;
  }
  return "";
}

function render(p) {
  photo = p;
  document.title = `${p.title} — Doisneau Bologna`;
  document.getElementById("page-content").innerHTML = `
    <div class="photo-detail-layout">
      <div class="photo-frame">
        <img src="${p.img}" alt="${p.title}">
        <span class="photo-frame-caption">© Atelier Robert Doisneau</span>
      </div>
      <div class="photo-info">
        <div class="info-row">
          ${stateBadge(p.state)}
        </div>
        <div class="info-row">
          <span class="info-label">Titolo</span>
          <span class="info-value large">${p.title}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Titolo originale</span>
          <span class="info-value italic">${p.originalTitle}</span>
        </div>
        <div class="info-row" style="display:grid;grid-template-columns:1fr 1fr;gap:0">
          <div>
            <span class="info-label">Anno</span>
            <span class="info-value">${p.year}</span>
          </div>
          <div>
            <span class="info-label">Luogo</span>
            <span class="info-value">${p.place}</span>
          </div>
        </div>
        <p class="info-desc">${p.description}</p>
        <div class="info-row">
          <span class="info-label">Prezzo</span>
          <span class="info-value price">${formatPrice(p.price)}</span>
        </div>
        <div class="action-area" id="action-area">
          ${buildActions(p)}
        </div>
      </div>
    </div>`;
}

function refreshActions() {
  document.getElementById("action-area").innerHTML = buildActions(photo);
}

function refreshPageForRole() { if (photo) refreshActions(); }

function handleBook() {
  API.bookPhoto(photo.id).then(updated => {
    photo = updated;
    toast("Fotografia prenotata con successo");
    refreshActions();
  }).catch(err => toast(err, "error"));
}

function handleCancelBooking() {
  confirmDialog("Vuoi eliminare la prenotazione?").then(ok => {
    if (!ok) return;
    API.cancelPhotoBooking(photo.id).then(updated => {
      photo = updated;
      toast("Prenotazione annullata");
      refreshActions();
    }).catch(err => toast(err, "error"));
  });
}

function handleConfirmSale() {
  confirmDialog("Confermi la vendita di questa fotografia?").then(ok => {
    if (!ok) return;
    API.confirmSale(photo.id).then(updated => {
      photo = updated;
      toast("Vendita confermata");
      refreshActions();
    }).catch(err => toast(err, "error"));
  });
}

API.getPhoto(photoId).then(p => {
  if (!p) { document.getElementById("page-content").innerHTML = '<p style="padding:3rem 2.5rem">Fotografia non trovata.</p>'; return; }
  render(p);
}).catch(() => toast("Errore nel caricamento", "error"));
</script>
</body>
</html>
