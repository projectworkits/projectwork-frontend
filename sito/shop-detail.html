<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prodotto — Doisneau, Lo sguardo che racconta</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .detail-layout {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;
      padding: 3rem 2.5rem 5rem; max-width: 960px;
    }
    .detail-img {
      background: #111; aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .detail-img img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(40%); }
    .detail-img-placeholder { font-size: 5rem; opacity: 0.1; }
    .detail-info { display: flex; flex-direction: column; gap: 1.2rem; }
    .detail-avail {
      font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(240,236,228,0.4);
    }
    .detail-avail.low { color: #c8a048; }
    .detail-avail.out { color: #c84848; }
    .detail-name { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 400; line-height: 1.2; }
    .detail-desc { font-size: 16px; line-height: 1.8; color: rgba(240,236,228,0.72); }
    .detail-price { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: #c8b482; }
    .booking-form { margin-top: 0.5rem; padding-top: 1.5rem; border-top: 0.5px solid rgba(200,180,130,0.15); }
    .qty-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .qty-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #c8b482; }
    .qty-input {
      width: 80px; background: rgba(255,255,255,0.03);
      border: 0.5px solid rgba(200,180,130,0.25);
      color: #f0ece4; font-family: 'Cormorant Garamond', serif;
      font-size: 18px; padding: 0.5rem 0.8rem; text-align: center; outline: none;
    }
    .qty-input:focus { border-color: #c8b482; }
    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: rgba(240,236,228,0.4); font-size: 13px; letter-spacing: 0.08em; text-decoration: none; margin: 1.5rem 2.5rem 0; transition: color 0.2s; }
    .back-link:hover { color: #c8b482; }
    .guest-note { font-size: 13px; color: rgba(240,236,228,0.4); font-style: italic; margin-top: 0.5rem; }

    body.light-mode .detail-img { background: #f0ebe0; }
    body.light-mode .detail-avail { color: rgba(31,31,31,0.4); }
    body.light-mode .detail-avail.low { color: #a07020; }
    body.light-mode .detail-avail.out { color: #9a3636; }
    body.light-mode .detail-desc { color: rgba(31,31,31,0.72); }
    body.light-mode .detail-price { color: #9a3636; }
    body.light-mode .booking-form { border-top-color: rgba(133,121,111,0.15); }
    body.light-mode .qty-input { background: #fff; border-color: rgba(133,121,111,0.3); color: #1f1f1f; }
    body.light-mode .qty-input:focus { border-color: #9a3636; }
    body.light-mode .qty-label { color: #9a3636; }
    body.light-mode .back-link { color: rgba(31,31,31,0.4); }
    body.light-mode .back-link:hover { color: #9a3636; }
    body.light-mode .guest-note { color: rgba(31,31,31,0.4); }

    @media (max-width: 700px) { .detail-layout { grid-template-columns: 1fr; gap: 2rem; padding: 2rem 1rem 4rem; } }
  </style>
</head>
<body>
<div class="site">

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>renderNavbar("shop");</script>

  <a href="shop-index.html" class="back-link">← Torna allo shop</a>

  <div id="page-content"></div>

  <footer class="footer">
    <span>© 2026 Mostra Doisneau — Pordenone</span>
    <span>Privacy · Accessibilità</span>
  </footer>

</div>
<script>
const params = new URLSearchParams(location.search);
const productId = parseInt(params.get("id"));
let product = null;

function render(p) {
  product = p;
  const isOut = p.available === 0;
  const isLow = p.available > 0 && p.available <= 5;
  const availClass = isOut ? "out" : isLow ? "low" : "";
  const availText  = isOut ? "Esaurito" : `${p.available} disponibili`;

  const bookingSection = isUser() && !isOut ? `
    <div class="booking-form">
      <div class="qty-row">
        <span class="qty-label">Quantità</span>
        <input type="number" class="qty-input" id="qty-input" min="1" max="${p.available}" value="1">
        <span style="font-size:13px;color:rgba(240,236,228,0.4)">/ ${p.available}</span>
      </div>
      <button class="btn btn-gold" onclick="handleBook()">Prenota</button>
    </div>` :
    isUser() && isOut ? `<p style="margin-top:1rem;font-size:14px;color:rgba(240,236,228,0.4)">Prodotto esaurito</p>` :
    `<p class="guest-note" style="margin-top:1rem;">Accedi come utente per prenotare.</p>`;

  document.getElementById("page-content").innerHTML = `
    <div class="detail-layout">
      <div class="detail-img">
        ${p.img ? `<img src="${p.img}" alt="${p.name}">` : `<div class="detail-img-placeholder">◻</div>`}
      </div>
      <div class="detail-info">
        <span class="detail-avail ${availClass}">${availText}</span>
        <h1 class="detail-name">${p.name}</h1>
        <p class="detail-desc">${p.description}</p>
        <div class="detail-price">${formatPrice(p.price)}</div>
        ${bookingSection}
      </div>
    </div>`;
}

function handleBook() {
  const qty = parseInt(document.getElementById("qty-input").value);
  if (!qty || qty < 1 || qty > product.available) {
    toast("Quantità non valida", "error"); return;
  }
  API.bookProduct(product.id, qty).then(updated => {
    product = updated;
    toast(`Prenotazione effettuata — ${qty} × ${product.name}`);
    render(updated);
  }).catch(err => toast(err, "error"));
}

function refreshPageForRole() { if (product) render(product); }

API.getProduct(productId).then(p => {
  if (!p) { document.getElementById("page-content").innerHTML = '<p style="padding:3rem 2.5rem">Prodotto non trovato.</p>'; return; }
  document.title = `${p.name} — Doisneau Pordenone`;
  render(p);
}).catch(() => toast("Errore nel caricamento", "error"));
</script>
</body>
</html>
