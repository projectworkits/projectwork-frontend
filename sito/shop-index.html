<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Doisneau, Lo sguardo che racconta</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .product-card {
      border: 0.5px solid rgba(200,180,130,0.2);
      background: rgba(200,180,130,0.02);
      display: flex; flex-direction: column;
      transition: border-color 0.25s, background 0.25s;
    }
    .product-card:hover { border-color: rgba(200,180,130,0.5); background: rgba(200,180,130,0.05); }
    .product-img {
      height: 180px; background: #111;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .product-img-placeholder {
      font-size: 3rem; opacity: 0.12;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(60%); }
    .product-body { padding: 1.4rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    .product-avail {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(240,236,228,0.4);
    }
    .product-avail.low { color: #c8a048; }
    .product-avail.out { color: #c84848; }
    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-weight: 400; line-height: 1.3;
    }
    .product-desc { font-size: 13px; color: rgba(240,236,228,0.55); line-height: 1.55; flex: 1; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid rgba(200,180,130,0.1); }
    .product-price { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: #c8b482; }

    body.light-mode .product-card { border-color: rgba(133,121,111,0.2); background: #fff; }
    body.light-mode .product-card:hover { border-color: rgba(154,54,54,0.4); background: rgba(154,54,54,0.02); }
    body.light-mode .product-img { background: #f0ebe0; }
    body.light-mode .product-avail { color: rgba(31,31,31,0.4); }
    body.light-mode .product-avail.low { color: #a07020; }
    body.light-mode .product-avail.out { color: #9a3636; }
    body.light-mode .product-desc { color: rgba(31,31,31,0.55); }
    body.light-mode .product-footer { border-top-color: rgba(133,121,111,0.12); }
    body.light-mode .product-price { color: #9a3636; }

    @media (max-width: 700px) { .shop-grid { grid-template-columns: 1fr 1fr; gap: 1rem; } }
    @media (max-width: 480px) { .shop-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="site">

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>renderNavbar("shop");</script>

  <div class="page-header">
    <p class="eyebrow">Merchandising</p>
    <h1 class="section-title">Shop</h1>
  </div>

  <div class="content">
    <div class="shop-grid" id="shop-grid"></div>
    <div class="pager" id="pager"></div>
  </div>

  <footer class="footer">
    <span>© 2026 Mostra Doisneau — Pordenone</span>
    <span>Privacy · Accessibilità</span>
  </footer>

</div>
<script>
const PER_PAGE = 20;
let currentPage = 1;
let allProducts = [];

function availLabel(n) {
  if (n === 0) return '<span class="product-avail out">Esaurito</span>';
  if (n <= 5)  return `<span class="product-avail low">${n} rimasti</span>`;
  return `<span class="product-avail">${n} disponibili</span>`;
}

function renderGrid(products) {
  const grid = document.getElementById("shop-grid");
  if (!products.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">◻</div><p>Nessun prodotto trovato.</p></div>';
    return;
  }
  grid.innerHTML = products.map(p => `
    <div class="product-card">
      <div class="product-img">
        ${p.img
          ? `<img src="${p.img}" alt="${p.name}">`
          : `<div class="product-img-placeholder">◻</div>`}
      </div>
      <div class="product-body">
        ${availLabel(p.available)}
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${truncate(p.description, 20)}</div>
        <div class="product-footer">
          <span class="product-price">${formatPrice(p.price)}</span>
          <a href="shop-detail.html?id=${p.id}" class="btn btn-gold btn-sm">Prenota</a>
        </div>
      </div>
    </div>
  `).join("");
}

function loadPage(page) {
  currentPage = page;
  const { items, total } = paginate(allProducts, page, PER_PAGE);
  renderGrid(items);
  renderPager(document.getElementById("pager"), page, total, loadPage);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

API.getProducts().then(products => {
  allProducts = products;
  loadPage(1);
});
</script>
</body>
</html>
