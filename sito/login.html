<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accedi — Doisneau, Lo sguardo che racconta</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
<div class="site">

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>
    // Se già loggato, redirect
    if (isLoggedIn()) location.replace("biglietti.html");
    renderNavbar("login");
  </script>

  <div class="auth-bg"></div>

  <main class="auth-page">
    <div class="auth-card">

      <a href="biglietti.html" class="auth-logo">← Doisneau · Pordenone</a>

      <h1 class="auth-title">Bentornato</h1>
      <p class="auth-subtitle">Accedi per prenotare fotografie e prodotti della mostra.</p>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-input" id="email" placeholder="nome@esempio.it" autocomplete="email">
        <div class="form-error" id="email-err"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="eye-btn" id="eye-btn" onclick="toggleEye()" title="Mostra/nascondi">👁</button>
        </div>
        <div class="form-error" id="pw-err"></div>
      </div>

      <div id="global-err" class="form-error" style="margin-bottom:1rem;font-size:14px;display:none"></div>

      <button class="btn btn-solid" style="width:100%;padding:0.85rem" onclick="handleLogin()">Accedi</button>

      <div class="auth-divider"><span>oppure</span></div>

      <div class="auth-switch">
        Non hai ancora un account?
        <a href="register.html">Registrati</a>
      </div>

      <div class="auth-demo">
        <div class="auth-demo-title">Account di demo</div>
        <div class="auth-demo-row">
          Admin — admin@demo.it / admin123
          <button onclick="fillDemo('admin@demo.it','admin123')">Usa</button>
        </div>
        <div class="auth-demo-row">
          Utente — utente@demo.it / utente123
          <button onclick="fillDemo('utente@demo.it','utente123')">Usa</button>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer" style="position:relative;z-index:1">
    <span>© 2026 Mostra Doisneau — Bologna</span>
    <span>Privacy · Accessibilità</span>
  </footer>

</div>
<script>
function toggleEye() {
  const inp = document.getElementById("password");
  const btn = document.getElementById("eye-btn");
  inp.type = inp.type === "password" ? "text" : "password";
  btn.textContent = inp.type === "password" ? "👁" : "🙈";
}

function fillDemo(email, pw) {
  document.getElementById("email").value = email;
  document.getElementById("password").value = pw;
  clearErrors();
}

function clearErrors() {
  ["email-err","pw-err","global-err"].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.textContent = ""; el.style.display = "none"; }
  });
}

function showGlobalError(msg) {
  const el = document.getElementById("global-err");
  el.textContent = msg;
  el.style.display = "block";
  // shake animation
  const card = document.querySelector(".auth-card");
  card.style.animation = "none";
  card.offsetHeight; // reflow
  card.style.animation = "shake 0.4s ease";
}

function handleLogin() {
  clearErrors();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  let valid = true;
  if (!email) {
    document.getElementById("email-err").textContent = "Inserisci la tua email.";
    valid = false;
  }
  if (!password) {
    document.getElementById("pw-err").textContent = "Inserisci la password.";
    valid = false;
  }
  if (!valid) return;

  const result = authLogin(email, password);
  if (!result.ok) {
    showGlobalError(result.error);
    return;
  }

  toast(`Benvenuto, ${result.user.name.split(" ")[0]}!`);
  const redirect = new URLSearchParams(location.search).get("from") || "biglietti.html";
  setTimeout(() => location.href = redirect, 700);
}

// Invio con Enter
document.addEventListener("DOMContentLoaded", () => {
  ["email","password"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") handleLogin();
    });
  });
});
</script>

<style>
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60%  { transform: translateX(-6px); }
  40%,80%  { transform: translateX(6px); }
}
</style>
</body>
</html>
