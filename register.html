<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrati — Doisneau, Lo sguardo che racconta</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
<div class="site">

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="navbar.js"></script>
  <script>
    if (isLoggedIn()) location.window.href = "biglietti.html";
    renderNavbar("register");
  </script>

  <div class="auth-bg"></div>

  <main class="auth-page">
    <div class="auth-card">

      <a href="biglietti.html" class="auth-logo">← Doisneau · Pordenone</a>

      <h1 class="auth-title">Crea un account</h1>
      <p class="auth-subtitle">Registrati per prenotare fotografie e prodotti della mostra.</p>

      <div class="form-group">
        <label class="form-label" for="name">Nome completo</label>
        <input type="text" class="form-input" id="name" placeholder="Mario Rossi" autocomplete="name">
        <div class="form-error" id="name-err"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" class="form-input" id="email" placeholder="nome@esempio.it" autocomplete="email">
        <div class="form-error" id="email-err"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="password" placeholder="minimo 6 caratteri" autocomplete="new-password" oninput="updateStrength()">
          <button type="button" class="eye-btn" id="eye-btn" onclick="toggleEye('password','eye-btn')" title="Mostra/nascondi">👁</button>
        </div>
        <div class="strength-bar" id="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-label" id="strength-label"></div>
        <div class="form-error" id="pw-err"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm">Conferma password</label>
        <div class="input-wrap">
          <input type="password" class="form-input" id="confirm" placeholder="••••••••" autocomplete="new-password">
          <button type="button" class="eye-btn" id="eye-btn2" onclick="toggleEye('confirm','eye-btn2')" title="Mostra/nascondi">👁</button>
        </div>
        <div class="form-error" id="confirm-err"></div>
      </div>

      <div id="global-err" class="form-error" style="margin-bottom:1rem;font-size:14px;display:none"></div>

      <button class="btn btn-solid" style="width:100%;padding:0.85rem" onclick="handleRegister()">Crea account</button>

      <div class="auth-divider"><span>oppure</span></div>

      <div class="auth-switch">
        Hai già un account?
        <a href="login.html">Accedi</a>
      </div>

    </div>
  </main>

  <footer class="footer" style="position:relative;z-index:1">
    <span>© 2026 Mostra Doisneau — Pordenone</span>
    <span>Privacy · Accessibilità</span>
  </footer>

</div>
<script>
function toggleEye(inputId, btnId) {
  const inp = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  inp.type = inp.type === "password" ? "text" : "password";
  btn.textContent = inp.type === "password" ? "👁" : "🙈";
}

function updateStrength() {
  const pw = document.getElementById("password").value;
  const segs = [document.getElementById("s1"), document.getElementById("s2"), document.getElementById("s3"), document.getElementById("s4")];
  const label = document.getElementById("strength-label");

  let score = 0;
  if (pw.length >= 6)  score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw) || /[^A-Za-z0-9]/.test(pw)) score++;

  const colors = ["#c84848","#c8a048","#c8b482","#4caf78"];
  const labels = ["Troppo corta","Debole","Discreta","Sicura"];
  segs.forEach((s, i) => { s.style.background = i < score ? colors[Math.min(score-1,3)] : "rgba(240,236,228,0.08)"; });
  label.textContent = pw.length > 0 ? labels[Math.min(score-1,3)] || "" : "";
  label.style.color = pw.length > 0 ? colors[Math.min(score-1,3)] : "";
}

function clearErrors() {
  ["name-err","email-err","pw-err","confirm-err","global-err"].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.textContent = ""; el.style.display = "none"; }
  });
}

function showGlobalError(msg) {
  const el = document.getElementById("global-err");
  el.textContent = msg;
  el.style.display = "block";
  const card = document.querySelector(".auth-card");
  card.style.animation = "none"; card.offsetHeight;
  card.style.animation = "shake 0.4s ease";
}

function setFieldError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = "block";
}

async function handleRegister() {
  clearErrors();
  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirm  = document.getElementById("confirm").value;

  let valid = true;
  if (!name || name.length < 2) { setFieldError("name-err", "Inserisci il tuo nome completo."); valid = false; }
  if (!email || !/\S+@\S+\.\S+/.test(email)) { setFieldError("email-err", "Inserisci un indirizzo email valido."); valid = false; }
  if (!password || password.length < 6) { setFieldError("pw-err", "La password deve essere di almeno 6 caratteri."); valid = false; }
  if (password !== confirm) { setFieldError("confirm-err", "Le password non coincidono."); valid = false; }
  if (!valid) return;

  const result = await authRegister(name, email, password);
  if (!result.ok) {
    showGlobalError(result.error);
    return;
  }

  toast(`Benvenuto, ${result.user.name.split(" ")[0]}!`);
  setTimeout(() => location.href = "biglietti.html", 700);

  async function authRegister(username, email, password) {
  try {
    const response = await fetch("https://localhost/api/users/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: username, email: email, password: password })
    });

    if (!response.ok) {
      const errorData = await response.json().catch(() => null);
      return {
        ok: false,
        error: errorData?.message || `Registrazione fallita (${response.status})`
      };
    } else {
      toast(`Benvenuto`);
    }
    
  } catch (err) {
    return { ok: false, error: "Errore di connessione al server." };
  }
}
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("confirm").addEventListener("keydown", e => {
    if (e.key === "Enter") handleRegister();
  });
});
</script>

<style>
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%,60%  { transform: translateX(-6px); }
  40%,80%  { transform: translateX(6px); }
}
</style>
</body>
</html>
