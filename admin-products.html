<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Prodotti</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header class="page-head">
    <div class="container">
      <div class="page-head-row">
        <div>
          <a href="admin-dashboard.html" class="eyebrow">← Dashboard</a>
          <h1 class="u-mt-2">Gestione <em>prodotti</em></h1>
          <p class="section-body">Elenco dei prodotti dello shop.</p>
        </div>
        <a href="admin-create-product.html" class="btn btn-primary">+ Nuovo prodotto</a>
      </div>
    </div>
  </header>

  <main class="container" style="padding-bottom: 5rem;">
    <div class="data-table-wrap">
      <table class="data-table" id="tbl">
        <thead>
          <tr><th>#</th><th>Nome</th><th>Descrizione</th><th>Disp.</th><th>Venduti</th><th>Prezzo</th><th class="is-actions">Azioni</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="data-table-empty u-hidden">Nessun prodotto presente.</div>
    </div>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/footer.js"></script>
  <script>
    (async () => {
      const user = await initApp();
      renderNavbar('admin', user);
      renderFooter();
      if (!requireStaff(user)) return;

      const tbody = document.getElementById('tbody');
      const emptyEl = document.getElementById('empty');

      async function reload() {
        tbody.innerHTML = '';
        let list = [];
        try { list = await API.products.list(); } catch (_) { toast('Errore di caricamento.', 'error'); return; }
        if (!list || !list.length) { document.getElementById('tbl').classList.add('u-hidden'); emptyEl.classList.remove('u-hidden'); return; }
        tbody.innerHTML = list.map(p => `
          <tr data-id="${p.product_id}">
            <td>${p.product_id}</td>
            <td>${escapeHtml(p.name || '')}</td>
            <td>${escapeHtml(truncate(p.description || '', 40))}</td>
            <td>${Number(p.available || 0)}</td>
            <td>${Number(p.sold || 0)}</td>
            <td>${fmtPrice(p.price)}</td>
            <td class="is-actions">
              <a class="btn btn-ghost btn-sm" href="admin-edit-product.html?id=${p.product_id}">Modifica</a>
              <button class="btn btn-danger btn-sm" data-act="del">Elimina</button>
            </td>
          </tr>`).join('');
      }

      tbody.addEventListener('click', async (e) => {
        const btn = e.target.closest('button[data-act="del"]');
        if (!btn) return;
        const tr = btn.closest('tr');
        const id = tr.dataset.id;
        const name = tr.children[1].textContent.trim();
        const ok = await confirmModal(`Eliminare definitivamente "${name}"?`, {
          title: 'Conferma eliminazione', okLabel: 'Elimina', danger: true
        });
        if (!ok) return;
        btn.disabled = true;
        try {
          await API.products.delete(id);
          tr.remove();
          toast('Prodotto eliminato.', 'success');
        } catch (err) {
          btn.disabled = false;
          toast(err.status === 403 ? 'Operazione non consentita.' : 'Errore durante l\u2019eliminazione.', 'error');
        }
      });

      await reload();
    })();
  </script>
</body>
</html>
