<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotografia — Admin</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .form-card { max-width: 680px; padding: 0 2.5rem 5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .img-preview { width: 100%; max-height: 220px; object-fit: contain; margin-top: 0.5rem; filter: grayscale(40%); }
    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: rgba(240,236,228,0.4); font-size: 13px; letter-spacing: 0.08em; text-decoration: none; margin: 1.5rem 2.5rem 0; transition: color 0.2s; }
    .back-link:hover { color: #c8b482; }
    body.light-mode .back-link { color: rgba(31,31,31,0.4); }
    body.light-mode .back-link:hover { color: #9a3636; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .form-card { padding: 0 1rem 4rem; } }
  </style>
</head>
<body>
<div class="site">
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="navbar.js"></script>

  <a href="admin-photos.html" class="back-link">← Torna all'elenco</a>

  <div class="page-header">
    <p class="eyebrow" id="page-eyebrow">Admin · Nuova Fotografia</p>
    <h1 class="section-title" id="page-title">Aggiungi fotografia</h1>
  </div>

  <div class="form-card">
    <div class="form-group">
      <label class="form-label">Titolo</label>
      <input type="text" class="form-input" id="title" placeholder="Es. Il bacio all'Hotel de Ville">
    </div>
    <div class="form-group">
      <label class="form-label">Titolo Originale</label>
      <input type="text" class="form-input" id="originalTitle" placeholder="Es. Le baiser de l'hôtel de ville">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Anno</label>
        <input type="number" class="form-input" id="year" placeholder="1950">
      </div>
      <div class="form-group">
        <label class="form-label">Luogo</label>
        <input type="text" class="form-input" id="place" placeholder="Parigi">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prezzo (€)</label>
        <input type="number" class="form-input" id="price" placeholder="1200">
      </div>
      <div class="form-group">
        <label class="form-label">Stato</label>
        <select class="form-select" id="state">
          <option value="disponibile">Disponibile</option>
          <option value="prenotata">Prenotata</option>
          <option value="venduta">Venduta</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Descrizione</label>
      <textarea class="form-input" id="description" rows="4" placeholder="Breve storia o dettagli tecnici..."></textarea>
    </div>
    <div class="form-group" id="file-group">
      <label class="form-label">Immagine (File)</label>
      <input type="file" class="form-input" id="photoFile" accept="image/*" onchange="previewImg(event)">
      <div id="preview-container" style="display:none">
        <img id="img-preview" class="img-preview">
      </div>
    </div>
    <div style="margin-top:2rem">
      <button class="btn btn-gold" id="save-btn" onclick="handleSave()">Salva fotografia</button>
    </div>
  </div>

  <footer class="footer">
    <span>© 2026 Mostra Doisneau — Pordenone</span>
  </footer>
</div>

<script>
const photoId = new URLSearchParams(location.search).get("id");
let existingPhoto = null;

function previewImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ex) => {
    const p = document.getElementById("img-preview");
    p.src = ex.target.result;
    document.getElementById("preview-container").style.display = "block";
  };
  reader.readAsDataURL(file);
}

async function handleSave() {
  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.textContent = "Salvataggio...";

  const data = {
    title: document.getElementById("title").value,
    originalTitle: document.getElementById("originalTitle").value,
    year: document.getElementById("year").value,
    place: document.getElementById("place").value,
    price: document.getElementById("price").value,
    state: document.getElementById("state").value,
    description: document.getElementById("description").value,
  };

  try {
    if (photoId) {
      // Update
      await API.updatePhoto(photoId, { ...existingPhoto, ...data });
      toast("Fotografia aggiornata");
      setTimeout(() => location.href = "admin-photos.html", 1000);
    } else {
      // Create (needs FormData for file)
      const fileInp = document.getElementById("photoFile");
      if (!fileInp.files.length) throw "Seleziona un'immagine";

      const fd = new FormData();
      fd.append("photo", fileInp.files[0]);
      // Aggiungiamo i dati come campi del FormData o JSON a seconda di come il backend si aspetta
      // Nel nostro data.js, createPhoto invia il FormData direttamente
      fd.append("title", data.title);
      fd.append("original_title", data.originalTitle);
      fd.append("year", data.year);
      fd.append("place", data.place);
      fd.append("description", data.description);
      fd.append("price", data.price);
      fd.append("state", data.state === "disponibile" ? "available" : (data.state === "prenotata" ? "booked" : "sold"));

      await API.createPhoto(fd);
      toast("Fotografia aggiunta");
      setTimeout(() => location.href = "admin-photos.html", 1000);
    }
  } catch (err) {
    toast(err, "error");
    btn.disabled = false;
    btn.textContent = "Salva fotografia";
  }
}

initApp().then(user => {
  renderNavbar("admin", user);
  if (!isAdmin(user)) { location.href = "index.html"; return; }

  if (photoId) {
    document.getElementById("page-eyebrow").textContent = "Admin · Modifica";
    document.getElementById("page-title").textContent = "Modifica fotografia";
    document.getElementById("file-group").style.display = "none"; // Non cambiamo file in update qui per semplicità
    API.getPhoto(photoId).then(p => {
      existingPhoto = p;
      document.getElementById("title").value = p.title;
      document.getElementById("originalTitle").value = p.originalTitle;
      document.getElementById("year").value = p.year;
      document.getElementById("place").value = p.place;
      document.getElementById("price").value = p.price;
      document.getElementById("state").value = p.state;
      document.getElementById("description").value = p.description;
      if (p.img) {
        const pre = document.getElementById("img-preview");
        pre.src = p.img;
        document.getElementById("preview-container").style.display = "block";
      }
    });
  }
});
</script>
</body>
</html>
