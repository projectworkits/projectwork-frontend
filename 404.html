<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doisneau · Pordenone — 404</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .err-stage { min-height: calc(100vh - var(--nav-h)); display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; position: relative; overflow: hidden; }
    .err-center { position: relative; z-index: 1; text-align: center; max-width: 680px; }
    .err-aperture { width: 220px; height: 220px; margin: 0 auto 2.5rem; position: relative; }
    .err-aperture svg { width: 100%; height: 100%; display: block; }
    .err-aperture svg polygon { fill: none; stroke: var(--golden-glow); stroke-width: 1.2; opacity: 0.85; }
    .err-aperture::before { content: ''; position: absolute; inset: -60px; border-radius: 50%; background: radial-gradient(circle, rgba(128,60,196,0.20) 0%, transparent 70%); pointer-events: none; }
    .err-code { font-family: var(--ff-display); font-size: clamp(5rem, 14vw, 10rem); line-height: 0.9; color: var(--golden-glow); letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .err-code em { font-style: italic; color: var(--blue-violet); }
    .err-text { color: var(--muted); font-size: 1.1rem; max-width: 480px; margin: 1.2rem auto 2.2rem; line-height: 1.7; }
  </style>
</head>
<body>

  <section class="err-stage">
    <div class="err-center">
      <div class="err-aperture" aria-hidden="true">
        <svg viewBox="0 0 200 200">
          <polygon points="100,10 165,35 190,100 165,165 100,190 35,165 10,100 35,35" />
          <polygon points="100,30 150,50 170,100 150,150 100,170 50,150 30,100 50,50" transform="rotate(22.5 100 100)" />
          <polygon points="100,60 125,75 140,100 125,125 100,140 75,125 60,100 75,75" />
          <circle cx="100" cy="100" r="3" fill="var(--golden-glow)"/>
        </svg>
      </div>
      <span class="eyebrow">Aperture · 404</span>
      <h1 class="err-code">4<em>0</em>4</h1>
      <p class="err-text">
        La pagina che cercavi è sfuggita dall'inquadratura.
        Torna alla mostra o accedi al tuo account per continuare.
      </p>
      <div class="u-flex u-gap-2" style="justify-content: center; flex-wrap: wrap;">
        <a href="index" class="btn btn-primary">Torna alla home</a>
        <a href="mostra-index" class="btn btn-ghost">Vai alla galleria</a>
      </div>
    </div>
  </section>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/footer.js"></script>
  <script>
    (async () => {
      const user = await initApp();
      renderNavbar(null, user);
      renderFooter();
    })();
  </script>
</body>
</html>
