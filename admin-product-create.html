<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prodotto — Admin</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .form-card { max-width: 620px; padding: 0 2.5rem 5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .back-link { display: inline-flex; align-items: center; gap: 0.4rem; color: rgba(240,236,228,0.4); font-size: 13px; letter-spacing: 0.08em; text-decoration: none; margin: 1.5rem 2.5rem 0; transition: color 0.2s; }
    .back-link:hover { color: #c8b482; }
    body.light-mode .back-link { color: rgba(31,31,31,0.4); }
    body.light-mode .back-link:hover { color: #9a3636; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .form-card { padding: 0 1rem 4rem; } }
  </style>
</head>
<body>
<div class="site">
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="navbar.js"></script>

  <a href="admin-products.html" class="back-link">← Torna all'elenco</a>

  <div class="page-header">
    <p class="eyebrow" id="page-eyebrow">Admin · Nuovo Prodotto</p>
    <h1 class="section-title" id="page-title">Aggiungi prodotto</h1>
  </div>

  <div class="form-card">
    <div class="form-group">
      <label class="form-label">Nome Prodotto</label>
      <input type="text" class="form-input" id="name" placeholder="Es. Catalogo della Mostra">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prezzo (€)</label>
        <input type="number" class="form-input" id="price" placeholder="25">
      </div>
      <div class="form-group">
        <label class="form-label">Disponibilità</label>
        <input type="number" class="form-input" id="available" placeholder="100">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Descrizione</label>
      <textarea class="form-input" id="description" rows="4" placeholder="Dettagli del prodotto..."></textarea>
    </div>
    <div style="margin-top:2rem">
      <button class="btn btn-gold" id="save-btn" onclick="handleSave()">Salva prodotto</button>
    </div>
  </div>

  <footer class="footer">
    <span>© 2026 Mostra Doisneau — Pordenone</span>
  </footer>
</div>

<script>
const productId = new URLSearchParams(location.search).get("id");
let existingProduct = null;

async function handleSave() {
  const btn = document.getElementById("save-btn");
  btn.disabled = true;
  btn.textContent = "Salvataggio...";

  const data = {
    name: document.getElementById("name").value,
    price: Number(document.getElementById("price").value),
    available: Number(document.getElementById("available").value),
    description: document.getElementById("description").value,
  };

  try {
    if (productId) {
      await API.updateProduct(productId, { ...existingProduct, ...data });
      toast("Prodotto aggiornato");
    } else {
      await API.createProduct(data);
      toast("Prodotto creato");
    }
    setTimeout(() => location.href = "admin-products.html", 1000);
  } catch (err) {
    toast(err, "error");
    btn.disabled = false;
    btn.textContent = "Salva prodotto";
  }
}

initApp().then(user => {
  renderNavbar("admin", user);
  if (!isAdmin(user)) { location.href = "index.html"; return; }

  if (productId) {
    document.getElementById("page-eyebrow").textContent = "Admin · Modifica";
    document.getElementById("page-title").textContent = "Modifica prodotto";
    API.getProduct(productId).then(p => {
      existingProduct = p;
      document.getElementById("name").value = p.name;
      document.getElementById("price").value = p.price;
      document.getElementById("available").value = p.available;
      document.getElementById("description").value = p.description;
    });
  }
});
</script>
</body>
</html>
