<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi · Doisneau Pordenone</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <section class="auth-shell">
    <div class="auth-bg" aria-hidden="true"></div>

    <div class="auth-card">
      <span class="auth-logo">Doisneau · Pordenone</span>
      <h1 class="auth-title">Accedi</h1>
      <p class="auth-subtitle">Entra nel tuo account per prenotare opere e acquistare souvenir.</p>

      <form id="loginForm" novalidate>
        <div class="form-field">
          <label class="form-label" for="username">Nome utente</label>
          <input class="form-input" id="username" name="username" type="text"
                 autocomplete="username" required pattern="[A-Za-z0-9]+" maxlength="50">
          <span class="form-error" id="err-username"></span>
        </div>

        <div class="form-field">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input class="form-input" id="password" name="password" type="password"
                   autocomplete="current-password" required>
            <button type="button" class="input-eye" id="togglePwd" aria-label="Mostra password">◉</button>
          </div>
          <span class="form-error" id="err-password"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Accedi</button>
        <span class="form-error u-center" id="err-form" style="margin-top: 1rem;"></span>
      </form>

      <div class="auth-divider"><span>Oppure</span></div>
      <p class="auth-switch">
        Non hai un account? <a href="register">Registrati</a>
      </p>
    </div>
  </section>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/navbar.js"></script>
  <script src="assets/js/footer.js"></script>
  <script>
    (async () => {
      const user = await initApp();
      renderNavbar('auth', user);
      renderFooter();
      if (user) { location.href = qs('from') || 'index.html'; return; }

      const form = document.getElementById('loginForm');
      const btn  = document.getElementById('submitBtn');
      const errF = document.getElementById('err-form');

      document.getElementById('togglePwd').addEventListener('click', () => {
        const p = document.getElementById('password');
        p.type = p.type === 'password' ? 'text' : 'password';
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errF.textContent = '';
        const u = form.username.value.trim();
        const p = form.password.value;
        if (!u || !p) { errF.textContent = 'Compila entrambi i campi.'; return; }
        btn.disabled = true;
        try {
          await API.auth.login(u, p);
          toast('Accesso effettuato', 'success');
          setTimeout(() => { location.href = qs('from') || 'index.html'; }, 400);
        } catch (err) {
          btn.disabled = false;
          errF.textContent = err.status === 401
            ? 'Credenziali non valide.'
            : 'Errore durante l\u2019accesso. Riprova.';
        }
      });
    })();
  </script>
</body>
</html>
