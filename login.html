<!DOCTYPE html>
<html lang="it">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Accedi — Doisneau, Lo sguardo che racconta</title>
	<link rel="stylesheet" href="style.css" />
	<link rel="stylesheet" href="shared.css" />
</head>

<body>
	<div class="site">

		<script src="data.js"></script>
		<script src="app.js"></script>
		<script src="navbar.js"></script>
		<script>
			initApp().then(user => {
				if (isLoggedIn(user)) location.href = "biglietti.html";
				renderNavbar("login", user);
			});
		</script>

		<div class="auth-bg"></div>

		<main class="auth-page">
			<div class="auth-card">

				<a href="biglietti.html" class="auth-logo">← Doisneau · Pordenone</a>

				<h1 class="auth-title">Bentornato</h1>
				<p class="auth-subtitle">Accedi per prenotare fotografie e prodotti della mostra.</p>

				<div class="form-group">
					<label class="form-label" for="username">username</label>
					<input type="username" class="form-input" id="username" placeholder="username"
						autocomplete="username">
					<div class="form-error" id="username-err"></div>
				</div>

				<div class="form-group">
					<label class="form-label" for="password">Password</label>
					<div class="input-wrap">
						<input type="password" class="form-input" id="password" placeholder="••••••••"
							autocomplete="current-password">
						<button type="button" class="eye-btn" id="eye-btn" onclick="toggleEye()"
							title="Mostra/nascondi">👁</button>
					</div>
					<div class="form-error" id="pw-err"></div>
				</div>

				<div id="global-err" class="form-error" style="margin-bottom:1rem;font-size:14px;display:none">
				</div>

				<button class="btn btn-solid" style="width:100%;padding:0.85rem" onclick="handleLogin()">Accedi</button>

				<div class="auth-divider"><span>oppure</span></div>

				<div class="auth-switch">
					Non hai ancora un account?
					<a href="register.html">Registrati</a>
				</div>

			</div>
		</main>

		<footer class="footer" style="position:relative;z-index:1">
			<span>© 2026 Mostra Doisneau — Pordenone</span>
			<span>Privacy · Accessibilità</span>
		</footer>

	</div>
	<script>
		function toggleEye() {
			const inp = document.getElementById("password");
			const btn = document.getElementById("eye-btn");
			inp.type = inp.type === "password" ? "text" : "password";
			btn.textContent = inp.type === "password" ? "👁" : "🙈";
		}

		function clearErrors() {
			["username-err", "pw-err", "global-err"].forEach(id => {
				const el = document.getElementById(id);
				if (el) { el.textContent = ""; el.style.display = "none"; }
			});
		}

		function showGlobalError(msg) {
			const el = document.getElementById("global-err");
			el.textContent = msg;
			el.style.display = "block";
			// shake animation
			const card = document.querySelector(".auth-card");
			card.style.animation = "none";
			card.offsetHeight; // reflow
			card.style.animation = "shake 0.4s ease";
		}

		async function handleLogin() {
			clearErrors();
			const username = document.getElementById("username").value.trim();
			const password = document.getElementById("password").value;

			let valid = true;
			if (!username) {
				document.getElementById("username-err").textContent = "Inserisci la tua username.";
				valid = false;
			}
			if (!password) {
				document.getElementById("pw-err").textContent = "Inserisci la password.";
				valid = false;
			}
			if (!valid) return;

			try {
				const user = await API.login(username, password);
				toast(`Benvenuto, ${user.username || username}!`);
				const redirect = new URLSearchParams(location.search).get("from") || "index.html";
				setTimeout(() => location.href = redirect, 700);
			} catch (err) {
				showGlobalError(err);
			}
		}
	</script>

	<style>
		@keyframes shake {

			0%,
			100% {
				transform: translateX(0);
			}

			20%,
			60% {
				transform: translateX(-6px);
			}

			40%,
			80% {
				transform: translateX(6px);
			}
		}
	</style>
</body>

</html>
